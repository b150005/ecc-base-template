name: Learning Mode Invariants

# Verifies the three deterministic preconditions that guard the Developer
# Learning Mode default-off invariant. See scripts/check-learn-invariants.sh
# and docs/en/adr/001-developer-growth-mode.md for the rationale.
# Renamed from growth-invariants.yml in v2.0.0 per ADR-003.
#
# This job runs on the template repository itself. Derived projects inherit
# the script but are free to drop this workflow if they do not use Learning Mode.

on:
  push:
    branches: [main]
    paths:
      - ".claude/agents/**"
      - ".claude/skills/learn/**"
      - "learn/**"
      - ".gitignore"
      - ".gitignore.example"
      - "scripts/check-learn-invariants.sh"
      - ".github/workflows/learn-invariants.yml"
  pull_request:
    paths:
      - ".claude/agents/**"
      - ".claude/skills/learn/**"
      - "learn/**"
      - ".gitignore"
      - ".gitignore.example"
      - "scripts/check-learn-invariants.sh"
      - ".github/workflows/learn-invariants.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Learning Mode invariant checks
        run: bash scripts/check-learn-invariants.sh
