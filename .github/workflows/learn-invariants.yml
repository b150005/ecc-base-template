name: Learning Mode Invariants

# Verifies the deterministic preconditions that guard the Developer Learning Mode
# default-off invariant. See .claude/meta/scripts/check-learn-invariants.sh and
# .claude/meta/adr/001-developer-growth-mode.md for the rationale.
#
# This workflow runs on the template repository itself to protect Learning Mode's
# guarantees. Derived projects that do not intend to maintain Learning Mode are
# expected to delete this workflow file and .claude/meta/ — the template ships them
# only so the contract is verifiable at the source.

on:
  push:
    branches: [main]
    paths:
      - ".claude/agents/**"
      - ".claude/skills/learn/**"
      - ".claude/learn/**"
      - ".gitignore"
      - ".gitignore.example"
      - ".claude/meta/scripts/check-learn-invariants.sh"
      - ".github/workflows/learn-invariants.yml"
  pull_request:
    paths:
      - ".claude/agents/**"
      - ".claude/skills/learn/**"
      - ".claude/learn/**"
      - ".gitignore"
      - ".gitignore.example"
      - ".claude/meta/scripts/check-learn-invariants.sh"
      - ".github/workflows/learn-invariants.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Learning Mode invariant checks
        run: bash .claude/meta/scripts/check-learn-invariants.sh
